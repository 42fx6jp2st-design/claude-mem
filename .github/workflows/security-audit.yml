name: Dependency Security Audit

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '23 6 * * 1'

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit
        run: npm run security:audit

